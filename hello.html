<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevBoard</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #6d28d9, #9333ea, #c084fc);
    color: white;
    text-align: center;
}

.container {
    max-width: 600px;
    padding: 2rem;
}

h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
}

p {
    font-size: 1.1rem;
    opacity: 0.9;
    margin-bottom: 2rem;
}

button {
    background: white;
    color: #6d28d9;
    border: none;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
    font-weight: bold;
}

button:hover {
    transform: translateY(-2px);
}
</style>
</head>
<body>
    <div class="container">
        <h1>DevBoard</h1>
        <p>
            A simple task tracker built for developers.
            Organize tasks, track progress, and stay focused.
        </p>
        <button>Get Started</button>
    </div>
</body>
</html>
